version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: microservices_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: microservices_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # User Service
  user_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.user_service
    container_name: user_service
    ports:
      - "8001:8000"
    environment:
      - APP_NAME=User Service
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/users_db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - JWT_SECRET_KEY=your-super-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped

  # Product Service (placeholder)
  product_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.product_service
    container_name: product_service
    ports:
      - "8002:8000"
    environment:
      - APP_NAME=Product Service
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/products_db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped

  # Order Service (placeholder)
  order_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.order_service
    container_name: order_service
    ports:
      - "8003:8000"
    environment:
      - APP_NAME=Order Service
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/orders_db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    restart: unless-stopped

  # Vue.js Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - microservices_network
    restart: unless-stopped



networks:
  microservices_network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
